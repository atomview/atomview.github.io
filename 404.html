<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Упс! Пиксели потерялись</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text-dim: #777;
            --border: #222;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        /* Эффект глитча для 404 */
        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            margin: 0;
            letter-spacing: -10px;
            background: linear-gradient(to bottom, #fff 30%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        h1 {
            font-size: 2rem;
            margin: 20px 0 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .btn-home {
            background: var(--accent);
            color: black;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-home:hover {
            transform: scale(1.05);
            background: #ccc;
        }

        /* Декоративный элемент (сетка как в редакторе) */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Область не найдена</h1>
        <p>Похоже, этот слой был удален или никогда не существовал. Мы проверили каждый пиксель, но здесь ничего нет.</p>
        
        <a href="https://atomview.github.io/" class="btn-home">Вернуться на главную</a>
    </div>

</body>
</html>
